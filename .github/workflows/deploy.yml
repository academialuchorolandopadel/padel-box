# Arma la app y la publica en GitHub Pages cada vez que subís un cambio a main.
# No necesitás hacer nada desde la terminal: GitHub se encarga de todo.
name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Si subís dos commits seguidos, cancela el build viejo y deja el más nuevo
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Traer el código
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Armar la app
        run: npm run build

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Subir el resultado del build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
